<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Especial: Saho 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --accent: #0055ff;
            --bg: #fff0f3;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#ffb3c1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
            width: 85%;
            box-shadow: 0 20px 60px rgba(255, 77, 109, 0.2);
            border: 2px solid white;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .emoji-display {
            font-size: 70px;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        h1 { color: var(--primary); margin-top: 0; font-weight: 700; }
        p { color: #594d5b; font-size: 1.1rem; line-height: 1.6; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.25);
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 77, 109, 0.4);
            filter: brightness(1.1);
        }

        #back-btn {
            background: #e0e0e0;
            color: #757575;
            font-size: 14px;
            box-shadow: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight {
            background: linear-gradient(120deg, #ffc2d1 0%, #ffc2d1 100%);
            background-repeat: no-repeat;
            background-size: 100% 30%;
            background-position: 0 80%;
        }
    </style>
</head>
<body>

<div id="game-card" class="fade-in">
    <div id="content">
        <span class="emoji-display">🕵️‍♀️</span>
        <h1>¡Hola, Saho!</h1>
        <p>He preparado algo especial para ti. Para avanzar, tienes que demostrar qué tan bien conoces nuestra historia... ¿Aceptas?</p>
        
        <div class="btn-group">
            <button onclick="changeStep(1)">¡Acepto el reto! ❤️</button>
            <button id="back-btn" onclick="troll()">No, prefiero dormir 💤</button>
        </div>
    </div>
</div>

<audio id="anniversary-sound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
    let step = 0;

    function troll() {
        const p = document.querySelector('p');
        p.innerHTML = "❌ <b style='color:red;'>ERROR:</b> Esa respuesta no es válida para una novia tan increíble. Intenta de nuevo.";
        document.getElementById('back-btn').style.display = 'none';
    }

    function changeStep(s) {
        const card = document.getElementById('game-card');
        const content = document.getElementById('content');
        
        // Efecto de transición
        content.style.opacity = 0;
        
        setTimeout(() => {
            if(s === 1) {
                content.innerHTML = `
                    <span class="emoji-display">📅</span>
                    <h1>Nivel 1</h1>
                    <p>¿Cuánto tiempo ha pasado desde que decidimos ser el <span class="highlight">mejor equipo del mundo</span>?</p>
                    <div class="btn-group">
                        <button onclick="changeStep(2)">6 meses de pura felicidad 💖</button>
                        <button onclick="changeStep(2)">Medio año aguantándote 😏</button>
                    </div>
                `;
            } else if(s === 2) {
                content.innerHTML = `
                    <span class="emoji-display">💏</span>
                    <h1>Nivel 2</h1>
                    <p>Si te digo que eres el amor de mi vida, ¿qué me dirías tú?</p>
                    <div class="btn-group">
                        <button onclick="changeStep(3)">Que yo te amo mucho más</button>
                        <button onclick="changeStep(3)">Que ya lo sabía, obvio 💅</button>
                    </div>
                `;
            } else if(s === 3) {
                content.innerHTML = `
                    <span class="emoji-display">🏆</span>
                    <h1>¡Misión Cumplida!</h1>
                    <p>Has superado todas las pruebas, Saho. Tu recompensa por ser la mejor novia está lista...</p>
                    <div class="btn-group">
                        <button onclick="revealFinal()" style="background: var(--accent);">REVELAR SORPRESA 🎁</button>
                    </div>
                `;
            }
            content.style.opacity = 1;
        }, 300);
    }

    function revealFinal() {
        try { document.getElementById('anniversary-sound').play(); } catch(e) {}
        
        const card = document.getElementById('game-card');
        card.style.borderColor = var(--accent);
        
        const content = document.getElementById('content');
        content.innerHTML = `
            <span class="emoji-display">🎢</span>
            <h1 style="color:var(--accent)">¡FELIZ 6 MESES!</h1>
            <p>Gracias por estos 6 meses increíbles, Saho. Para celebrar como te mereces...</p>
            <div style="margin: 20px 0; padding: 15px; border-radius: 15px; background: #e7f0ff;">
                <h2 style="color:#003399; margin:0;">¡NOS VAMOS A UNIVERSAL STUDIOS! ✨</h2>
            </div>
            <p>Te amo con todo mi corazón ❤️</p>
        `;

        // Lanzar confeti de varios colores
        var end = Date.now() + (4 * 1000);
        var colors = ['#ff4d6d', '#0055ff', '#ffffff', '#ffb3c1'];

        (function frame() {
            confetti({
                particleCount: 4,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
            });
            confetti({
                particleCount: 4,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }
</script>

</body>
</html>
